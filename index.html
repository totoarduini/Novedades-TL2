<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intercambio CREA TL2 — 2026</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f4f1ec;--surface:#fff;--surface2:#ede9e1;--border:#dbd6cc;
  --text:#2b2925;--muted:#7a7266;
  --agro:#456b4f;--agro-bg:#e7f1ea;
  --gan:#7a5230;--gan-bg:#f5ebe2;
  --fin:#305a7a;--fin-bg:#e2edf5;
  --tbo:#5a6b40;--tbo-bg:#edf1e4;
  --inv:#6b5a30;--inv-bg:#f5f0e2;
  --oth:#5f4a7a;--oth-bg:#ece6f4;
  --tag:#e2ddd6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;}
header{background:#211e1a;color:#fff;padding:22px 28px 18px;}
header h1{font-size:19px;font-weight:600;letter-spacing:-.3px;}
header p{font-size:12px;color:rgba(255,255,255,.4);margin-top:3px;font-weight:300;}
.month-bar{background:#2d2925;padding:0 28px;display:flex;border-bottom:1px solid rgba(255,255,255,.08);}
.m-btn{padding:11px 20px;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,.45);border-bottom:3px solid transparent;transition:all .15s;user-select:none;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;}
.m-btn:hover{color:rgba(255,255,255,.8);}
.m-btn.active{color:#fff;border-bottom-color:#c9a76a;}
.m-btn .cnt{font-size:11px;font-family:'IBM Plex Mono',monospace;background:rgba(255,255,255,.12);border-radius:4px;padding:1px 6px;margin-left:6px;}
.m-btn.active .cnt{background:rgba(201,167,106,.25);color:#c9a76a;}
.tab-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;overflow-x:auto;}
.t-btn{padding:12px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-bottom:3px solid transparent;white-space:nowrap;transition:all .15s;user-select:none;background:none;border-top:none;border-left:none;border-right:none;}
.t-btn:hover{color:var(--text);}
.t-btn.active{color:var(--text);border-bottom-color:var(--text);}
.t-btn .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle;}
.container{max-width:1100px;margin:0 auto;padding:24px 28px 60px;}
.m-panel{display:none;}.m-panel.active{display:block;}
.t-panel{display:none;}.t-panel.active{display:block;animation:fadeUp .18s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:13px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:11px;overflow:hidden;}
.card.full{grid-column:1/-1;}
.card.agro{border-left:4px solid var(--agro);}
.card.gan{border-left:4px solid var(--gan);}
.card.fin{border-left:4px solid var(--fin);}
.card.tbo{border-left:4px solid var(--tbo);}
.card.inv{border-left:4px solid var(--inv);}
.card.oth{border-left:4px solid var(--oth);}
.card-head{padding:10px 15px;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);cursor:pointer;position:relative;}
.card-head::after{content:'⤢';position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:12px;opacity:.35;}
.card-head:hover::after{opacity:.7;}
.card.agro .card-head{background:var(--agro-bg);color:var(--agro);}
.card.gan .card-head{background:var(--gan-bg);color:var(--gan);}
.card.fin .card-head{background:var(--fin-bg);color:var(--fin);}
.card.tbo .card-head{background:var(--tbo-bg);color:var(--tbo);}
.card.inv .card-head{background:var(--inv-bg);color:var(--inv);}
.card.oth .card-head{background:var(--oth-bg);color:var(--oth);}
.erow{padding:10px 15px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:68px 1fr;gap:10px;align-items:start;font-size:13px;}
.erow:last-child{border-bottom:none;}
.etag{display:inline-flex;align-items:center;justify-content:center;background:var(--tag);border-radius:5px;font-size:11px;font-weight:700;padding:2px 6px;white-space:nowrap;letter-spacing:.3px;}
.erow .val{line-height:1.6;}
.cb,.fb{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-weight:600;font-size:12px;margin-bottom:4px;}
.cb.up,.fb.ok{background:#e7f1ea;color:#2d6040;}
.cb.hold,.fb.reg{background:#fef9e7;color:#7d6a00;}
.cb.dn,.fb.mal{background:#fdecea;color:#8b1a1a;}
.emp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:9px;margin-bottom:18px;}
.emp-btn{background:var(--surface);border:2px solid var(--border);border-radius:9px;padding:10px 13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:9px;user-select:none;}
.emp-btn:hover{border-color:#b0a898;}
.emp-btn.active{border-color:var(--text);background:var(--text);color:#fff;}
.emp-btn.active .emp-sub{color:rgba(255,255,255,.5);}
.emp-ico{width:32px;height:32px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;flex-shrink:0;}
.emp-btn.active .emp-ico{background:rgba(255,255,255,.15);color:#fff;}
.emp-nm{font-weight:600;font-size:13px;}
.emp-sub{font-size:10px;color:var(--muted);}
.d-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
@media(max-width:600px){.d-grid{grid-template-columns:1fr;}}
.d-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.d-item.full{grid-column:1/-1;}
.d-lbl{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.pill{padding:2px 6px;border-radius:99px;font-size:10px;font-weight:600;text-transform:uppercase;}
.pill.agro{background:var(--agro-bg);color:var(--agro);}
.pill.gan{background:var(--gan-bg);color:var(--gan);}
.pill.fin{background:var(--fin-bg);color:var(--fin);}
.pill.tbo{background:var(--tbo-bg);color:var(--tbo);}
.pill.inv{background:var(--inv-bg);color:var(--inv);}
.pill.oth{background:var(--oth-bg);color:var(--oth);}
.d-val{font-size:13px;line-height:1.6;}
.tbo-table{width:100%;border-collapse:collapse;font-size:12.5px;}
.tbo-table th{background:var(--tbo-bg);color:var(--tbo);font-weight:600;font-size:10.5px;letter-spacing:.4px;text-transform:uppercase;padding:7px 11px;text-align:right;border-bottom:2px solid var(--border);}
.tbo-table th:first-child{text-align:left;}
.tbo-table td{padding:7px 11px;border-bottom:1px solid var(--border);text-align:right;font-family:'IBM Plex Mono',monospace;font-size:11.5px;}
.tbo-table td:first-child{font-family:'IBM Plex Sans',sans-serif;font-weight:600;text-align:left;font-size:13px;}
.tbo-table tr:last-child td{border-bottom:none;}
.tbo-table .yr-last{background:#f7f4ef;font-weight:600;}
.tbo-table .na{color:var(--muted);font-style:italic;}
.dp{color:#2d6040;font-size:10.5px;}.dn2{color:#8b1a1a;font-size:10.5px;}
.tbo-sec{margin-bottom:20px;}.tbo-sec:last-child{margin-bottom:0;}
.tbo-sec-title{font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--tbo);margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.overlay{display:none;position:fixed;inset:0;z-index:999;background:rgba(26,22,18,.75);backdrop-filter:blur(4px);padding:14px;overflow-y:auto;}
.overlay.open{display:flex;align-items:flex-start;justify-content:center;animation:fadeUp .15s ease;}
.modal{background:var(--surface);border-radius:13px;width:100%;max-width:740px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.3);}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1;}
.modal-close{width:26px;height:26px;border-radius:50%;border:none;background:var(--surface2);color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:var(--border);}
.modal-body{overflow-x:auto;}
.modal-body .tbo-table td,.modal-body .tbo-table th{padding:8px 13px;font-size:12.5px;}
@media(max-width:680px){
  .container{padding:16px 14px 50px;}
  .month-bar,.tab-bar{padding:0 14px;}
  header{padding:18px 14px 14px;}
  .grid{grid-template-columns:1fr;}
  .emp-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));}
}
</style>
</head>
<body>

<header>
  <h1>Intercambio CREA TL2 — 2026</h1>
  <p>Resumen de respuestas al formulario mensual de novedades</p>
</header>

<div class="month-bar">

</div>

<div class="tab-bar">

    <div class="t-panel" id="mar-tbo"></div>
    <div class="t-panel" id="mar-fin"></div>
    <div class="t-panel" id="mar-inv"></div>

</div>

<div class="overlay" id="overlay" onclick="closeModal(event)">

      <button class="modal-close" onclick="closeModal()">✕</button>

    <div class="modal-body" id="modal-body"></div>

</div>

   rows:[[2021,606,535,1881,419],[2022,637,490,1927,394],[2023,696,453,2218,478],[2024,683,346,2240,486],[2025,767,361,2727,523],[2026,848,458,2765,544]]},
  {t:'Litros diarios totales', cols:['AL','LA','LP','C4'],
   rows:[[2021,15205,18550,71099,13222],[2022,16706,15463,73467,11240],[2023,20314,12793,86961,15995],[2024,20287,10974,84739,15650],[2025,22948,12275,101440,17929],[2026,25408,15736,103135,19131]]},
 ],
},
};

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
function ico(n){ return (n||'').replace(/[^A-Za-z0-9]/g,'').substring(0,3).toUpperCase()||'?'; }

function erow(tag,val){ return `<div class="erow"><span class="etag">${esc(tag)}</span><span class="val">${esc(val)}</span></div>`; }
function erownl(tag,html){ return `<div class="erow"><span class="etag">${esc(tag)}</span><span class="val">${html}</span></div>`; }

function card(cls,icon,title,body,full){ return `<div class="card ${cls}${full?' full':''}">\n<div class="card-head">${icon} ${esc(title)}</div>\n${body}</div>`; }

function finBadge(cls,sit){ const s={ok:{cls:'ok',sym:'✓'},reg:{cls:'reg',sym:'~'},mal:{cls:'mal',sym:'✕'}}[cls]||{cls:'reg',sym:'~'}; return `<span class="fb ${s.cls}">${s.sym} ${esc(sit)}</span>`; }
function criaBadge(cls,txt){ const s={up:{cls:'up',sym:'↑'},hold:{cls:'hold',sym:'→'},dn:{cls:'dn',sym:'↓'}}[cls]||{cls:'hold',sym:'→'}; return `<span class="cb ${s.cls}">${s.sym} ${esc(txt)}</span>`; }

function fmtN(n){ if(n===null||n===undefined) return '<span class="na">s/d</span>'; if(n>=1000) return n.toLocaleString('es-AR',{maximumFractionDigits:0}); return n.toLocaleString('es-AR',{minimumFractionDigits:1,maximumFractionDigits:1}); }

function buildDatos(datos){
  return datos.map(t=>{
    const rows = t.rows;
    const last = rows[rows.length-1];
    const prev = rows[rows.length-2];
    let tbody='';
    rows.forEach((r,i)=>{
      const isL=(i===rows.length-1);
      let cells='';
      for(let j=1;j<r.length;j++){
        const v=r[j], p=prev?prev[j]:null;
        let delta='';
        if(isL&&p!=null&&v!=null){const pct=((v-p)/p*100).toFixed(1); delta=v>p?` <span class="dp">▲${pct}%</span>`:v<p?` <span class="dn2">▼${Math.abs(pct)}%</span>`:'`';}
        cells+=`<td>${fmtN(v)}${delta}</td>`;
      }
      tbody+=`<tr${isL?' class="yr-last"':''}><td>${r[0]}</td>${cells}</tr>`;
    });
    const ths=t.cols.map(c=>`<th>${c}</th>`).join('');
    return `<div class="tbo-sec"><div class="tbo-sec-title">${esc(t.t)}</div><table class="tbo-table"><thead><tr><th>Año</th>${ths}</tr></thead><tbody>${tbody}</tbody></table></div>`;
  }).join('');
}

// ─── RENDER TABS ──────────────────────────────────────────────────────────────
function render(m){
  const d=D[m], emps=d.empresas;

  // ── RESUMEN ──
  let html='<div class="grid">';

  // Temas
  let tBody='';
  emps.forEach(e=>{
    const t=d.temas&&d.temas[e]; if(!t) return;
    const parts=[];
    if(t.emp) parts.push(`<b>Empresarial:</b> ${esc(t.emp)}`);
    if(t.tec) parts.push(`<b>Técnico:</b> ${esc(t.tec)}`);
    if(t.inst) parts.push(`<b>Institucional:</b> ${esc(t.inst)}`);
    if(t.otro) parts.push(esc(t.otro));
    if(parts.length) tBody+=erownl(e,parts.join('<br>'));
  });
  if(tBody) html+=card('oth','💬','Novedades y temas propuestos',tBody,true);

  // Gruesa
  let gBody='';
  emps.forEach(e=>{ if(d.gruesa&&d.gruesa[e]) gBody+=erow(e,d.gruesa[e]); });
  if(gBody) html+=card('agro','🌻','Gruesa 2025/26',gBody,true);

  // CC
  let ccBody='';
  emps.forEach(e=>{ if(d.cc&&d.cc[e]) ccBody+=erow(e,d.cc[e]); });
  if(ccBody) html+=card('agro','🌾','Cultivos de cobertura',ccBody);

  // Comercial
  let coBody='';
  emps.forEach(e=>{ if(d.comercial&&d.comercial[e]) coBody+=erow(e,d.comercial[e]); });
  if(coBody) html+=card('agro','📊','Comercialización',coBody);

  // Cría tendencia
  let criaBody='';
  emps.forEach(e=>{ const c=d.cria&&d.cria[e]; if(!c||!c.tend) return; criaBody+=erownl(e,criaBadge(c.cls,c.tend)); });
  if(criaBody) html+=card('gan','🐄','Cría — tendencia',criaBody);

  // Financiero resumen
  let finBody='';
  emps.forEach(e=>{ const f=d.fin&&d.fin[e]; if(!f||!f.sit) return; finBody+=erownl(e,finBadge(f.cls,f.sit)); });
  if(finBody) html+=card('fin','💰','Situación financiera',finBody);

  html+='</div>';
  document.getElementById(m+'-resumen').innerHTML=html;

  // ── AGRÍCOLA ──
  let ahtml='<div class="grid">';
  if(gBody) ahtml+=card('agro','🌻','Gruesa 2025/26',gBody,true);
  if(ccBody) ahtml+=card('agro','🌾','Cultivos de cobertura',ccBody);
  if(coBody) ahtml+=card('agro','📊','Comercialización',coBody);
  if(d.insumos){
    let insBody=''; emps.forEach(e=>{ if(d.insumos[e]) insBody+=erow(e,d.insumos[e]); });
    if(insBody) ahtml+=card('agro','🧪','Insumos 2026/27',insBody);
  }
  ahtml+='</div>';
  document.getElementById(m+'-agro').innerHTML=ahtml;

  // ── GANADERÍA ──
  let ganhtml='<div class="grid">';
  // Estado cría (feb has it)
  let estBody='';
  if(d.cria) emps.forEach(e=>{ const c=d.cria[e]; if(c&&c.est) estBody+=erow(e,c.est); });
  if(estBody) ganhtml+=card('gan','🐄','Estado de la cría',estBody,true);
  if(criaBody) ganhtml+=card('gan','📈','Tendencia en cría',criaBody);
  // C&V
  let cyvBody='';
  emps.forEach(e=>{
    const cv=d.cyv&&d.cyv[e]; if(!cv) return;
    const parts=[];
    if(cv.c) parts.push(`<b>Compras:</b> ${esc(cv.c)}`);
    if(cv.v) parts.push(`<b>Ventas:</b> ${esc(cv.v)}`);
    if(parts.length) cyvBody+=erownl(e,parts.join('<br>'));
  });
  if(cyvBody) ganhtml+=card('gan full','🛒','Compras y ventas',cyvBody,true);
  ganhtml+='</div>';
  document.getElementById(m+'-gan').innerHTML=ganhtml;

  // ── TAMBO ──
  let tbohtml='<div class="grid">';
  let tboNovBody='';
  emps.forEach(e=>{ if(d.tbo&&d.tbo[e]) tboNovBody+=erow(e,d.tbo[e]); });
  if(tboNovBody) tbohtml+=card('tbo','💬','Novedades de tambo',tboNovBody,true);
  if(d.datos){
    const tablesHtml=buildDatos(d.datos);
    tbohtml+=`<div class="card tbo full"><div class="card-head">📊 Datos productivos — cierre enero de cada año</div><div style="padding:14px 16px;">${tablesHtml}</div></div>`;
  }
  tbohtml+='</div>';
  document.getElementById(m+'-tbo').innerHTML=tbohtml;

  // ── FINANCIERO ──
  let finhtml='<div class="grid">';
  let finFullBody='';
  emps.forEach(e=>{
    const f=d.fin&&d.fin[e]; if(!f) return;
    let content=finBadge(f.cls,f.sit);
    if(f.fin) content+=`<br><span style="color:var(--muted);font-size:12px">Financiación: ${esc(f.fin)}</span>`;
    finFullBody+=erownl(e,content);
  });
  if(finFullBody) finhtml+=card('fin full','💰','Situación financiera y financiación',finFullBody,true);
  // Comentarios adicionales feb
  if(d.comentarios){
    let comBody=''; emps.forEach(e=>{ if(d.comentarios[e]) comBody+=erow(e,d.comentarios[e]); });
    if(comBody) finhtml+=card('oth full','💬','Otros comentarios',comBody,true);
  }
  finhtml+='</div>';
  document.getElementById(m+'-fin').innerHTML=finhtml;

  // ── INVERSIONES ──
  let invhtml='<div class="grid">';
  let invBody=''; emps.forEach(e=>{ if(d.inver&&d.inver[e]&&d.inver[e]!='Ninguna'&&d.inver[e]!='Nada') invBody+=erow(e,d.inver[e]); });
  if(invBody) invhtml+=card('inv full','🔧','Inversiones recientes / previstas',invBody,true);
  invhtml+='</div>';
  document.getElementById(m+'-inv').innerHTML=invhtml;

  // ── POR EMPRESA ──
  const btns=emps.map(e=>`<div class="emp-btn" onclick="selEmp('${m}','${e.replace(/'/g,"\\'")}',this)"><div class="emp-ico">${ico(e)}</div><div><div class="emp-nm">${esc(e)}</div></div></div>`).join('');
  document.getElementById(m+'-empresa').innerHTML=`<div class="emp-grid" id="${m}-emp-grid">${btns}</div><div id="${m}-emp-det"></div>`;

  // Attach modal listeners
  ['resumen','agro','gan','tbo','fin','inv'].forEach(tab=>{
    const el=document.getElementById(m+'-'+tab);
    if(el) el.querySelectorAll('.card-head').forEach(h=>h.onclick=()=>openModal(h));
  });

  // Select first empresa
  const firstBtn=document.querySelector(`#${m}-emp-grid .emp-btn`);
  if(firstBtn){ firstBtn.classList.add('active'); renderEmpDetail(m,emps[0]); }
}

function selEmp(m,e,el){
  document.querySelectorAll(`#${m}-emp-grid .emp-btn`).forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderEmpDetail(m,e);
}

function renderEmpDetail(m,e){
  const det=document.getElementById(m+'-emp-det'); if(!det) return;
  const d=D[m];
  let items='';

  function di(label,cat,content,full){
    const catNames={agro:'Agrícola',gan:'Ganadería',fin:'Financiero',tbo:'Tambo',inv:'Inversiones',oth:'Novedades'};
    if(!content) return '';
    return `<div class="d-item${full?' full':''}"><div class="d-lbl"><span class="pill ${cat}">${catNames[cat]||cat}</span>${label}</div><div class="d-val">${content}</div></div>`;
  }

  // Temas
  const t=d.temas&&d.temas[e];
  if(t){
    const parts=[];
    if(t.emp) parts.push(`<b>Empresarial:</b> ${esc(t.emp)}`);
    if(t.tec) parts.push(`<b>Técnico:</b> ${esc(t.tec)}`);
    if(t.inst) parts.push(`<b>Institucional:</b> ${esc(t.inst)}`);
    if(t.otro) parts.push(esc(t.otro));
    if(parts.length) items+=di('💬 Novedades / temas','oth',parts.join('<br>'),true);
  }

  // Agrícola
  if(d.gruesa&&d.gruesa[e]) items+=di('🌻 Gruesa 2025/26','agro',esc(d.gruesa[e]));
  if(d.cc&&d.cc[e]) items+=di('🌾 Coberturas','agro',esc(d.cc[e]));
  if(d.comercial&&d.comercial[e]) items+=di('📊 Comercialización','agro',esc(d.comercial[e]));
  if(d.insumos&&d.insumos[e]) items+=di('🧪 Insumos 2026/27','agro',esc(d.insumos[e]));

  // Ganadería
  const c=d.cria&&d.cria[e];
  if(c){
    if(c.est) items+=di('🐄 Estado cría','gan',esc(c.est),true);
    if(c.tend) items+=di('📈 Tendencia cría','gan',criaBadge(c.cls,c.tend));
  }
  const cv=d.cyv&&d.cyv[e];
  if(cv){
    const parts=[];
    if(cv.c) parts.push(`<b>Compras:</b> ${esc(cv.c)}`);
    if(cv.v) parts.push(`<b>Ventas:</b> ${esc(cv.v)}`);
    if(parts.length) items+=di('🛒 Compras / Ventas','gan',parts.join('<br>'),true);
  }

  // Tambo
  if(d.tbo&&d.tbo[e]) items+=di('🐮 Tambo','tbo',esc(d.tbo[e]),true);

  // Financiero
  const f=d.fin&&d.fin[e];
  if(f&&f.sit){
    let fc=finBadge(f.cls,f.sit);
    if(f.fin) fc+=`<br><b>Financiación:</b> ${esc(f.fin)}`;
    items+=di('💰 Financiero','fin',fc,true);
  }

  // Inversiones
  if(d.inver&&d.inver[e]) items+=di('🔧 Inversiones','inv',esc(d.inver[e]),true);

  // Comentarios adicionales
  if(d.comentarios&&d.comentarios[e]) items+=di('💬 Comentario adicional','oth',esc(d.comentarios[e]),true);

  det.innerHTML=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:13px 17px;margin-bottom:13px;display:flex;align-items:center;gap:11px;">
    <div style="width:42px;height:42px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;">${ico(e)}</div>
    <div style="font-size:17px;font-weight:700;">${esc(e)}</div>
  </div><div class="d-grid">${items||'<div style="color:var(--muted);font-size:13px;">Sin datos registrados.</div>'}</div>`;
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(h){
  const c=h.closest('.card'); const clone=c.cloneNode(true); clone.querySelector('.card-head').remove();
  const mh=document.getElementById('modal-hd');
  mh.style.background=getComputedStyle(h).backgroundColor;
  mh.style.color=getComputedStyle(h).color;
  document.getElementById('modal-title').textContent=h.textContent.replace('⤢','').trim();
  document.getElementById('modal-body').innerHTML=clone.innerHTML;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}});

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
let curM='mar', curT='resumen';
function switchMonth(m,el){
  document.querySelectorAll('.m-btn').forEach(b=>b.classList.remove('active')); el.classList.add('active');
  document.querySelectorAll('.m-panel').forEach(p=>p.classList.remove('active')); document.getElementById('m-'+m).classList.add('active');
  curM=m;
  document.querySelectorAll('.t-panel').forEach(p=>p.classList.remove('active'));
  const tp=document.getElementById(m+'-'+curT); if(tp) tp.classList.add('active');
}
function switchTab(t,el){
  document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('active')); el.classList.add('active');
  document.querySelectorAll(`#m-${curM} .t-panel`).forEach(p=>p.classList.remove('active'));
  const tp=document.getElementById(curM+'-'+t); if(tp) tp.classList.add('active');
  curT=t;
}

// ─── INIT ────────────────────────────────────────────────────────────────────
render('feb');
render('mar');
</script>
