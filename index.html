<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Intercambio CREA TL2 — 2026</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f1ec;--sf:#fff;--sf2:#ede9e1;--bd:#dbd6cc;--tx:#2b2925;--mu:#7a7266;
--ag:#456b4f;--ag2:#e7f1ea;--gn:#7a5230;--gn2:#f5ebe2;--fi:#305a7a;--fi2:#e2edf5;
--tb:#5a6b40;--tb2:#edf1e4;--iv:#6b5a30;--iv2:#f5f0e2;--ot:#5f4a7a;--ot2:#ece6f4;--tg:#e2ddd6;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.6;}
header{background:#211e1a;color:#fff;padding:22px 28px 18px;}
header h1{font-size:19px;font-weight:600;letter-spacing:-.3px;}
header p{font-size:12px;color:rgba(255,255,255,.4);margin-top:3px;}
.mbar{background:#2d2925;padding:0 28px;display:flex;border-bottom:1px solid rgba(255,255,255,.08);}
.mbtn{padding:11px 20px;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,.45);border-bottom:3px solid transparent;transition:all .15s;user-select:none;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;}
.mbtn:hover{color:rgba(255,255,255,.8);}
.mbtn.on{color:#fff;border-bottom-color:#c9a76a;}
.mbtn .ct{font-size:11px;font-family:'IBM Plex Mono',monospace;background:rgba(255,255,255,.12);border-radius:4px;padding:1px 6px;margin-left:6px;}
.mbtn.on .ct{background:rgba(201,167,106,.25);color:#c9a76a;}
.tbar{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 28px;display:flex;overflow-x:auto;}
.tbtn{padding:12px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--mu);border-bottom:3px solid transparent;white-space:nowrap;transition:all .15s;user-select:none;background:none;border-top:none;border-left:none;border-right:none;}
.tbtn:hover{color:var(--tx);}
.tbtn.on{color:var(--tx);border-bottom-color:var(--tx);}
.tbtn .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle;}
.wrap{max-width:1100px;margin:0 auto;padding:24px 28px 60px;}
.mp{display:none;}.mp.on{display:block;}
.tp{display:none;}.tp.on{display:block;animation:fu .18s ease;}
@keyframes fu{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:13px;}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:11px;overflow:hidden;}
.card.W{grid-column:1/-1;}
.card.ag{border-left:4px solid var(--ag);}.card.ag .ch{background:var(--ag2);color:var(--ag);}
.card.gn{border-left:4px solid var(--gn);}.card.gn .ch{background:var(--gn2);color:var(--gn);}
.card.fi{border-left:4px solid var(--fi);}.card.fi .ch{background:var(--fi2);color:var(--fi);}
.card.tb{border-left:4px solid var(--tb);}.card.tb .ch{background:var(--tb2);color:var(--tb);}
.card.iv{border-left:4px solid var(--iv);}.card.iv .ch{background:var(--iv2);color:var(--iv);}
.card.ot{border-left:4px solid var(--ot);}.card.ot .ch{background:var(--ot2);color:var(--ot);}
.ch{padding:10px 15px;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--bd);cursor:pointer;position:relative;}
.ch::after{content:'⤢';position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:12px;opacity:.3;}
.ch:hover::after{opacity:.7;}
.er{padding:10px 15px;border-bottom:1px solid var(--bd);display:grid;grid-template-columns:68px 1fr;gap:10px;align-items:start;font-size:13px;}
.er:last-child{border-bottom:none;}
.et{display:inline-flex;align-items:center;justify-content:center;background:var(--tg);border-radius:5px;font-size:11px;font-weight:700;padding:2px 6px;white-space:nowrap;}
.er .vl{line-height:1.6;}
.fb{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-weight:600;font-size:12px;}
.fb.ok{background:#e7f1ea;color:#2d6040;}
.fb.rg{background:#fef9e7;color:#7d6a00;}
.fb.ml{background:#fdecea;color:#8b1a1a;}
.eg{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:9px;margin-bottom:18px;}
.eb{background:var(--sf);border:2px solid var(--bd);border-radius:9px;padding:10px 13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:9px;user-select:none;}
.eb:hover{border-color:#b0a898;}
.eb.on{border-color:var(--tx);background:var(--tx);color:#fff;}
.eb.on .es{color:rgba(255,255,255,.5);}
.ei{width:32px;height:32px;border-radius:6px;background:var(--sf2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;flex-shrink:0;}
.eb.on .ei{background:rgba(255,255,255,.15);color:#fff;}
.en{font-weight:600;font-size:13px;}
.es{font-size:10px;color:var(--mu);}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
@media(max-width:600px){.dg{grid-template-columns:1fr;}}
.di{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;}
.di.W{grid-column:1/-1;}
.dl{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--mu);margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.pl{padding:2px 6px;border-radius:99px;font-size:10px;font-weight:600;text-transform:uppercase;}
.pl.ag{background:var(--ag2);color:var(--ag);}
.pl.gn{background:var(--gn2);color:var(--gn);}
.pl.fi{background:var(--fi2);color:var(--fi);}
.pl.tb{background:var(--tb2);color:var(--tb);}
.pl.iv{background:var(--iv2);color:var(--iv);}
.pl.ot{background:var(--ot2);color:var(--ot);}
.dv{font-size:13px;line-height:1.6;}
.tt{width:100%;border-collapse:collapse;font-size:12.5px;}
.tt th{background:var(--tb2);color:var(--tb);font-weight:600;font-size:10.5px;letter-spacing:.4px;text-transform:uppercase;padding:7px 11px;text-align:right;border-bottom:2px solid var(--bd);}
.tt th:first-child{text-align:left;}
.tt td{padding:7px 11px;border-bottom:1px solid var(--bd);text-align:right;font-family:'IBM Plex Mono',monospace;font-size:11.5px;}
.tt td:first-child{font-family:'IBM Plex Sans',sans-serif;font-weight:600;text-align:left;font-size:13px;}
.tt tr:last-child td{border-bottom:none;}
.tt .yl{background:#f7f4ef;font-weight:600;}
.tt .na{color:var(--mu);font-style:italic;}
.dp{color:#2d6040;font-size:10.5px;}
.dn{color:#8b1a1a;font-size:10.5px;}
.ts{margin-bottom:20px;}.ts:last-child{margin-bottom:0;}
.st{font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--tb);margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--bd);}
.ov{display:none;position:fixed;inset:0;z-index:999;background:rgba(26,22,18,.75);backdrop-filter:blur(4px);padding:14px;overflow-y:auto;}
.ov.on{display:flex;align-items:flex-start;justify-content:center;animation:fu .15s ease;}
.mo{background:var(--sf);border-radius:13px;width:100%;max-width:740px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.3);}
.mh{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:1;}
.mc{width:26px;height:26px;border-radius:50%;border:none;background:var(--sf2);color:var(--tx);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mc:hover{background:var(--bd);}
.mb{overflow-x:auto;}
@media(max-width:680px){.wrap{padding:16px 14px 50px;}.mbar,.tbar{padding:0 14px;}header{padding:18px 14px 14px;}.grid{grid-template-columns:1fr;}.eg{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));}.tt td,.tt th{padding:5px 7px;font-size:10.5px;}}
</style>
</head>
<body>
<header>
  <h1>Intercambio CREA TL2 — 2026</h1>
  <p>Resumen de respuestas al formulario mensual de novedades</p>
</header>
<div class="mbar">
  <button class="mbtn" onclick="setM('feb',this)">Febrero 2026 <span class="ct">11</span></button>
  <button class="mbtn" onclick="setM('mar',this)">Marzo 2026 <span class="ct">13</span></button>
  <button class="mbtn on" onclick="setM('abr',this)">Abril 2026 <span class="ct">13</span></button>
</div>
<div class="tbar">
  <button class="tbtn on" onclick="setT('res',this)"><span class="dot" style="background:#999"></span>Resumen</button>
  <button class="tbtn" onclick="setT('emp',this)"><span class="dot" style="background:#999"></span>Por empresa</button>
  <button class="tbtn" onclick="setT('agr',this)"><span class="dot" style="background:var(--ag)"></span>Agrícola</button>
  <button class="tbtn" onclick="setT('gan',this)"><span class="dot" style="background:var(--gn)"></span>Ganadería</button>
  <button class="tbtn" onclick="setT('tbo',this)"><span class="dot" style="background:var(--tb)"></span>Tambo</button>
  <button class="tbtn" onclick="setT('fin',this)"><span class="dot" style="background:var(--fi)"></span>Financiero</button>
  <button class="tbtn" onclick="setT('inv',this)"><span class="dot" style="background:var(--iv)"></span>Inversiones</button>
</div>
<div class="wrap">
  <div class="mp" id="mp-feb">
    <div class="tp on" id="feb-res"></div><div class="tp" id="feb-emp"></div>
    <div class="tp" id="feb-agr"></div><div class="tp" id="feb-gan"></div>
    <div class="tp" id="feb-tbo"></div><div class="tp" id="feb-fin"></div>
    <div class="tp" id="feb-inv"></div>
  </div>
  <div class="mp" id="mp-mar">
    <div class="tp on" id="mar-res"></div><div class="tp" id="mar-emp"></div>
    <div class="tp" id="mar-agr"></div><div class="tp" id="mar-gan"></div>
    <div class="tp" id="mar-tbo"></div><div class="tp" id="mar-fin"></div>
    <div class="tp" id="mar-inv"></div>
  </div>
  <div class="mp on" id="mp-abr">
    <div class="tp on" id="abr-res"></div><div class="tp" id="abr-emp"></div>
    <div class="tp" id="abr-agr"></div><div class="tp" id="abr-gan"></div>
    <div class="tp" id="abr-tbo"></div><div class="tp" id="abr-fin"></div>
    <div class="tp" id="abr-inv"></div>
  </div>
</div>
<div class="ov" id="ov" onclick="closeOv(event)">
  <div class="mo" onclick="event.stopPropagation()">
    <div class="mh" id="mh"><span id="mt"></span><button class="mc" onclick="closeOv()">✕</button></div>
    <div class="mb" id="mb"></div>
  </div>
</div>

<script>
// ── helpers ──────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const E = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
const ico = n => (n||'').replace(/[^A-Za-z0-9]/g,'').slice(0,3).toUpperCase()||'?';

function row(tag, val) {
  return '<div class="er"><span class="et">'+E(tag)+'</span><span class="vl">'+E(val)+'</span></div>';
}
function rowH(tag, html) {
  return '<div class="er"><span class="et">'+E(tag)+'</span><span class="vl">'+html+'</span></div>';
}
function card(cls, icon, title, body, wide) {
  return '<div class="card '+cls+(wide?' W':'')+'"><div class="ch">'+icon+' '+E(title)+'</div>'+body+'</div>';
}
function badge(cls, sym, text) {
  return '<span class="fb '+cls+'">'+sym+' '+E(text)+'</span>';
}
function finB(cls, txt) {
  var m = {ok:['ok','✓'], rg:['rg','~'], ml:['ml','✕']}[cls] || ['rg','~'];
  return badge(m[0], m[1], txt);
}
function openModal(h) {
  var c = h.closest('.card'), cl = c.cloneNode(true);
  cl.querySelector('.ch').remove();
  var mh = $('mh'), cs = getComputedStyle(h);
  mh.style.background = cs.backgroundColor; mh.style.color = cs.color;
  $('mt').textContent = h.textContent.replace('⤢','').trim();
  $('mb').innerHTML = cl.innerHTML;
  $('ov').classList.add('on');
  document.body.style.overflow = 'hidden';
}
function closeOv(e) {
  if (e && e.target !== $('ov')) return;
  $('ov').classList.remove('on');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeOv(); });

function attach(el) {
  if (!el) return;
  el.querySelectorAll('.ch').forEach(function(h){ h.onclick = function(){ openModal(h); }; });
}

// ── navigation ───────────────────────────────────────────────────────────────
var CM = 'abr', CT = 'res';
function setM(m, btn) {
  document.querySelectorAll('.mbtn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  document.querySelectorAll('.mp').forEach(function(p){ p.classList.remove('on'); });
  $('mp-'+m).classList.add('on');
  CM = m;
  document.querySelectorAll('.tp').forEach(function(p){ p.classList.remove('on'); });
  var tp = $(m+'-'+CT); if(tp) tp.classList.add('on');
}
function setT(t, btn) {
  document.querySelectorAll('.tbtn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  document.querySelectorAll('#mp-'+CM+' .tp').forEach(function(p){ p.classList.remove('on'); });
  var tp = $(CM+'-'+t); if(tp) tp.classList.add('on');
  CT = t;
}

// ── tambo tables ─────────────────────────────────────────────────────────────
function tboTables(data) {
  return data.map(function(t) {
    var rows = t.rows, last = rows[rows.length-1], prev = rows[rows.length-2];
    var tbody = '';
    rows.forEach(function(r, i) {
      var isL = (i === rows.length-1);
      var cells = '';
      for (var j = 1; j < r.length; j++) {
        var v = r[j], p = prev ? prev[j] : null;
        var delta = '';
        if (isL && p != null && v != null) {
          var pct = ((v-p)/p*100).toFixed(1);
          if (v > p) delta = ' <span class="dp">▲'+pct+'%</span>';
          else if (v < p) delta = ' <span class="dn">▼'+Math.abs(pct)+'%</span>';
        }
        var fmt = v == null ? '<span class="na">s/d</span>' :
          (v >= 1000 ? v.toLocaleString('es-AR',{maximumFractionDigits:0}) :
                       v.toLocaleString('es-AR',{minimumFractionDigits:1,maximumFractionDigits:1}));
        cells += '<td>'+fmt+delta+'</td>';
      }
      tbody += '<tr'+(isL?' class="yl"':'')+'>'+
        '<td>'+r[0]+'</td>'+cells+'</tr>';
    });
    var ths = t.cols.map(function(c){ return '<th>'+c+'</th>'; }).join('');
    return '<div class="ts"><div class="st">'+E(t.t)+'</div>'+
      '<table class="tt"><thead><tr><th>Año</th>'+ths+'</tr></thead>'+
      '<tbody>'+tbody+'</tbody></table></div>';
  }).join('');
}

// ── por empresa ──────────────────────────────────────────────────────────────
function empDetail(month, e, container) {
  var d = DATA[month];
  function di(lbl, cls, nm, content, wide) {
    if (!content) return '';
    return '<div class="di'+(wide?' W':'')+'">'+
      '<div class="dl"><span class="pl '+cls+'">'+nm+'</span>'+lbl+'</div>'+
      '<div class="dv">'+content+'</div></div>';
  }
  var items = '';
  // temas
  if (d.temas && d.temas[e]) {
    var t = d.temas[e], parts = [];
    if(t.emp) parts.push('<b>Empresarial:</b> '+E(t.emp));
    if(t.tec) parts.push('<b>Técnico:</b> '+E(t.tec));
    if(t.inst) parts.push('<b>Institucional:</b> '+E(t.inst));
    if(t.otro) parts.push('<b>Otro:</b> '+E(t.otro));
    if(parts.length) items += di('💬 Novedades','ot','Novedades',parts.join('<br>'),true);
  }
  // secciones planas
  var plain = [
    ['gruesa','ag','Agrícola','🌻 Gruesa'],['cc','ag','Agrícola','🌾 Coberturas'],
    ['comercial','ag','Agrícola','📊 Comercialización'],['insumos','ag','Agrícola','🧪 Insumos'],
    ['cosecha_soja','ag','Agrícola','🌱 Cosecha soja'],['fina','ag','Agrícola','🌾 Fina 2026'],
    ['tbo_nov','tb','Tambo','🐮 Tambo'],['inver','iv','Inversiones','🔧 Inversiones']
  ];
  plain.forEach(function(p) {
    if(d[p[0]] && d[p[0]][e]) items += di(p[3],p[1],p[2],E(d[p[0]][e]));
  });
  // cria
  if (d.cria && d.cria[e]) {
    var c = d.cria[e];
    if(c.est) items += di('🐄 Estado cría','gn','Ganadería',E(c.est),true);
    if(c.tend) items += di('📈 Tendencia','gn','Ganadería',E(c.tend));
  }
  // c&v
  if (d.cyv && d.cyv[e]) {
    var cv = d.cyv[e], cparts = [];
    if(cv.c) cparts.push('<b>Compras:</b> '+E(cv.c));
    if(cv.v) cparts.push('<b>Ventas:</b> '+E(cv.v));
    if(cparts.length) items += di('🛒 Compras/Ventas','gn','Ganadería',cparts.join('<br>'),true);
  }
  // fin
  if (d.fin && d.fin[e]) {
    var f = d.fin[e];
    if(f.sit) {
      var fc = finB(f.cls,f.sit);
      if(f.fin) fc += '<br><b>Financiación:</b> '+E(f.fin);
      items += di('💰 Financiero','fi','Financiero',fc,true);
    }
  }
  container.innerHTML =
    '<div style="background:var(--sf);border:1px solid var(--bd);border-radius:11px;padding:13px 17px;margin-bottom:13px;display:flex;align-items:center;gap:11px;">'+
    '<div style="width:42px;height:42px;border-radius:8px;background:var(--sf2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;">'+ico(e)+'</div>'+
    '<div style="font-size:17px;font-weight:700;">'+E(e)+'</div></div>'+
    '<div class="dg">'+(items||'<div style="color:var(--mu)">Sin datos.</div>')+'</div>';
}

function buildEmpTab(month, panelId) {
  var d = DATA[month], panel = $(panelId);
  if(!panel) return;
  var btns = d.empresas.map(function(e) {
    return '<div class="eb" onclick="selEmp(\''+month+'\',\''+e.replace(/'/g,"\\'")+ '\',this)">'+
      '<div class="ei">'+ico(e)+'</div>'+
      '<div><div class="en">'+E(e)+'</div></div></div>';
  }).join('');
  panel.innerHTML = '<div class="eg" id="eg-'+month+'">'+btns+'</div><div id="ed-'+month+'"></div>';
  var first = panel.querySelector('.eb');
  if(first){ first.classList.add('on'); empDetail(month, d.empresas[0], $('ed-'+month)); }
}
function selEmp(month, e, btn) {
  document.querySelectorAll('#eg-'+month+' .eb').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  empDetail(month, e, $('ed-'+month));
}

// ── render month ──────────────────────────────────────────────────────────────
function renderMonth(m) {
  var d = DATA[m];

  // build each tab's HTML
  var tabs = {};
  ['res','agr','gan','tbo','fin','inv'].forEach(function(t){ tabs[t] = '<div class="grid">'; });

  // Temas
  if (d.temas) {
    var tBody = '';
    d.empresas.forEach(function(e) {
      var t = d.temas[e]; if(!t) return;
      var parts = [];
      if(t.emp) parts.push('<b>Empresarial:</b> '+E(t.emp));
      if(t.tec) parts.push('<b>Técnico:</b> '+E(t.tec));
      if(t.inst) parts.push('<b>Institucional:</b> '+E(t.inst));
      if(t.otro) parts.push('<b>Otro:</b> '+E(t.otro));
      if(parts.length) tBody += rowH(e, parts.join('<br>'));
    });
    if(tBody) { var c = card('ot','💬','Novedades y temas propuestos',tBody,true); tabs.res += c; }
  }

  // Agrícola sections
  var agrSecs = [
    {k:'gruesa',    icon:'🌻', title:'Gruesa 2025/26',        res:true, wide:true},
    {k:'cosecha_soja', icon:'🌱', title:'Cosecha soja',       res:true, wide:true},
    {k:'cc',        icon:'🌾', title:'Cultivos de cobertura',  res:false},
    {k:'comercial', icon:'📊', title:'Comercialización',       res:true},
    {k:'insumos',   icon:'🧪', title:'Insumos 2026/27',        res:false, wide:true},
    {k:'fina',      icon:'🌾', title:'Fina 2026 — superficie', res:true},
  ];
  agrSecs.forEach(function(s) {
    if(!d[s.k]) return;
    var body = '';
    d.empresas.forEach(function(e){ if(d[s.k][e]) body += row(e, d[s.k][e]); });
    if(!body) return;
    var c = card('ag', s.icon, s.title, body, !!s.wide);
    tabs.agr += c;
    if(s.res) tabs.res += c;
  });

  // Ganadería
  if(d.cria) {
    var estBody = '', tendBody = '';
    d.empresas.forEach(function(e) {
      var c = d.cria[e]; if(!c) return;
      if(c.est) estBody += row(e, c.est);
      if(c.tend) tendBody += rowH(e, E(c.tend));
    });
    if(estBody) tabs.gan += card('gn','🐄','Estado de la cría',estBody,true);
    if(tendBody) { var tc = card('gn','📈','Tendencia en cría',tendBody); tabs.gan += tc; tabs.res += tc; }
  }
  if(d.cyv) {
    var cyvBody = '';
    d.empresas.forEach(function(e) {
      var cv = d.cyv[e]; if(!cv) return;
      var parts = [];
      if(cv.c) parts.push('<b>Compras:</b> '+E(cv.c));
      if(cv.v) parts.push('<b>Ventas:</b> '+E(cv.v));
      if(parts.length) cyvBody += rowH(e, parts.join('<br>'));
    });
    if(cyvBody) { var cc = card('gn full','🛒','Compras y ventas',cyvBody,true); tabs.gan += cc; tabs.res += cc; }
  }

  // Tambo novedades
  if(d.tbo_nov) {
    var tNov = '';
    d.empresas.forEach(function(e){ if(d.tbo_nov[e]) tNov += row(e, d.tbo_nov[e]); });
    if(tNov) tabs.tbo += card('tb','💬','Novedades de tambo',tNov,true);
  }
  // Tambo datos
  if(d.datos) {
    tabs.tbo += '<div class="card tb W"><div class="ch">📊 Datos productivos — cierre enero de cada año</div>'+
      '<div style="padding:14px 16px;">'+tboTables(d.datos)+'</div></div>';
  }

  // Financiero
  var finBody = '';
  if(d.fin) {
    d.empresas.forEach(function(e) {
      var f = d.fin[e]; if(!f || !f.sit) return;
      var content = finB(f.cls, f.sit);
      if(f.fin) content += '<br><span style="color:var(--mu);font-size:12px">Financiación: '+E(f.fin)+'</span>';
      finBody += rowH(e, content);
    });
    if(finBody) {
      var fc = card('fi','💰','Situación financiera y financiación',finBody,true);
      tabs.fin += fc; tabs.res += fc;
    }
  }

  // Inversiones
  if(d.inver) {
    var invBody = '';
    d.empresas.forEach(function(e){ if(d.inver[e]) invBody += row(e, d.inver[e]); });
    if(invBody) tabs.inv += card('iv full','🔧','Inversiones recientes / previstas',invBody,true);
  }

  // Write tabs
  ['res','agr','gan','tbo','fin','inv'].forEach(function(t) {
    var el = $(m+'-'+t); if(!el) return;
    el.innerHTML = tabs[t] + '</div>';
    attach(el);
  });

  // Empresa tab
  buildEmpTab(m, m+'-emp');
}
